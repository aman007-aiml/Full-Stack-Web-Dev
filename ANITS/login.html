<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANITS Campus Placement Portal</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: Arial, sans-serif;
        }
        h2 {
            text-align: center;
            margin-top: 100px;
            margin-bottom: 20px;
        }
        .login-box {
            background-color: white;
            width: 600px;
            margin: 0 auto;
            padding: 30px;
            border: 1px solid #d3d3d3;
            border-radius: 8px;
            box-shadow: 2px 2px 10px #e0e0e0;
        }
        td {
            font-size: 14px;
            padding-bottom: 5px;
            color: #444;
        }
        input[type="text"], input[type="password"] {
            width: 96%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        input[type="submit"] {
            width: 100%;
            background-color: #0b4c8c;
            color: white;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
        }
        input[type="submit"]:hover {
            background-color: #083868;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #0e4f90;
            color: #ffffff;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>

</head>

<body>
    <header>
        <div class="logo">
            <img src="logo.jpeg" alt="ANITS Logo">
        </div>
        <div class="title">
            <h1>Anil Neerukonda Institute of Technology & Sciences</h1>
            <h3>Campus Placement Portal</h3>
        </div>
    </header>
    <nav>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="success.html">Register</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="companies.html">Companies</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <h2>Student Login</h2>
    <div class="login-box">
        <form action="register.html" method="POST">
            <table width="100%">
                <tr>
                    <td>Username</td>
                </tr>
                <tr>
                    <td>
                        <input type="text" name="username" required>
                    </td>
                </tr>
                
                <tr>
                    <td>Password</td>
                </tr>
                <tr>
                    <td>
                        <input type="password" name="password" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="submit" value="Login">
                    </td>
                </tr>
            </table>

        </form>
    </div>
    <footer>
        © 2026 ANITS | Department of Training & Placement
    </footer>
</body>
</html>
